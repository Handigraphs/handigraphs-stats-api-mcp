name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - name: Use an npm CLI with trusted publishing support
        run: npm install --global npm@11
      - run: npm ci
      - name: Verify release tag matches package version
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      - run: npm run pack:check
      - run: npm run distributions:check
      - run: npm run mcpb:pack
      - run: npm publish --access public
      - name: Attach Claude Desktop extension to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          package_version="$(node -p "require('./package.json').version")"
          gh release upload "$GITHUB_REF_NAME" "artifacts/handigraphs-stats-api-mcp-${package_version}.mcpb" --clobber
